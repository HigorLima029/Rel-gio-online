<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Relógio Digital Mundial</title>
</head>
<body>

    <button id="theme-toggle" class="icon-btn" title="Alternar tema claro/escuro" aria-label="Alternar tema">
        <svg class="icon icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
    </button>

    <main class="app">
        <header class="app-header">
            <p class="eyebrow">Fuso horário</p>
            <h1>Que horas são <span id="pais-nome-titulo">no Brasil</span>?</h1>
        </header>

        <section class="seletor">
            <span class="bandeira" id="bandeira">🇧🇷</span>
            <select id="fuso" aria-label="Escolher país">
                <option value="America/Sao_Paulo" data-flag="🇧🇷" data-nome="no Brasil" selected>🇧🇷 Brasil — São Paulo</option>
                <option value="America/New_York" data-flag="🇺🇸" data-nome="nos EUA (Nova York)">🇺🇸 Estados Unidos — Nova York</option>
                <option value="America/Los_Angeles" data-flag="🇺🇸" data-nome="nos EUA (Los Angeles)">🇺🇸 Estados Unidos — Los Angeles</option>
                <option value="Europe/Madrid" data-flag="🇪🇸" data-nome="na Espanha">🇪🇸 Espanha — Madri</option>
                <option value="Europe/Lisbon" data-flag="🇵🇹" data-nome="em Portugal">🇵🇹 Portugal — Lisboa</option>
                <option value="Europe/London" data-flag="🇬🇧" data-nome="no Reino Unido">🇬🇧 Reino Unido — Londres</option>
                <option value="Europe/Paris" data-flag="🇫🇷" data-nome="na França">🇫🇷 França — Paris</option>
                <option value="Europe/Berlin" data-flag="🇩🇪" data-nome="na Alemanha">🇩🇪 Alemanha — Berlim</option>
                <option value="Europe/Moscow" data-flag="🇷🇺" data-nome="na Rússia">🇷🇺 Rússia — Moscou</option>
                <option value="Asia/Dubai" data-flag="🇦🇪" data-nome="em Dubai">🇦🇪 Emirados Árabes — Dubai</option>
                <option value="Asia/Kolkata" data-flag="🇮🇳" data-nome="na Índia">🇮🇳 Índia — Nova Délhi</option>
                <option value="Asia/Shanghai" data-flag="🇨🇳" data-nome="na China">🇨🇳 China — Pequim</option>
                <option value="Asia/Tokyo" data-flag="🇯🇵" data-nome="no Japão">🇯🇵 Japão — Tóquio</option>
                <option value="Australia/Sydney" data-flag="🇦🇺" data-nome="na Austrália">🇦🇺 Austrália — Sydney</option>
                <option value="America/Argentina/Buenos_Aires" data-flag="🇦🇷" data-nome="na Argentina">🇦🇷 Argentina — Buenos Aires</option>
                <option value="America/Mexico_City" data-flag="🇲🇽" data-nome="no México">🇲🇽 México — Cidade do México</option>
                <option value="Africa/Johannesburg" data-flag="🇿🇦" data-nome="na África do Sul">🇿🇦 África do Sul — Joanesburgo</option>
            </select>
            <span class="offset" id="offset">UTC-03:00</span>
        </section>

        <button id="view-toggle" class="link-btn">Ver relógio analógico</button>

        <section class="relogio-wrap" id="view-digital">
            <div class="relogio">
                <div>
                    <span id="horas">00</span>
                    <span class="tempo">Horas</span>
                </div>
                <div>
                    <span id="minutos">00</span>
                    <span class="tempo">Minutos</span>
                </div>
                <div>
                    <span id="segundos">00</span>
                    <span class="tempo">Segundos</span>
                </div>
            </div>
            <p class="data" id="data">carregando...</p>
        </section>

        <section class="relogio-wrap analogico" id="view-analogico" hidden>
            <svg class="analog" viewBox="0 0 300 300">
                <circle class="mostrador" cx="150" cy="150" r="140"/>
                <g class="marcas" id="marcas"></g>
                <line id="ponteiro-hora" class="ponteiro hora" x1="150" y1="150" x2="150" y2="85"/>
                <line id="ponteiro-minuto" class="ponteiro minuto" x1="150" y1="150" x2="150" y2="55"/>
                <line id="ponteiro-segundo" class="ponteiro segundo" x1="150" y1="150" x2="150" y2="40"/>
                <circle class="centro" cx="150" cy="150" r="6"/>
            </svg>
            <p class="data" id="data-analog">carregando...</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
